<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8"/>
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">RK<span class="accent-dot">.</span></div>
      <h1 class="login-title">Admin Access</h1>
      <p class="login-sub">Enter your password to edit portfolio content</p>
      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
      <form method="post" class="login-form">
        {% csrf_token %}
        <input type="password" name="password" class="login-input" placeholder="Password" autofocus autocomplete="current-password"/>
        <button type="submit" class="login-btn">Unlock Dashboard →</button>
      </form>
      <a href="/" class="login-back">← Back to portfolio</a>
    </div>
  </div>
</body>
</html>
